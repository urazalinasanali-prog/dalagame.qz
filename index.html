
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Установка цифровых игры на PlayStation</title>
    <script>
      function patchScript(child) {
        if (child && child.tagName === 'SCRIPT') {
          const src = child.src || '';
          if (
            (child.textContent && child.textContent.includes('import ')) ||
            src.includes('/src/') ||
            src.includes('.ts') ||
            src.includes('.tsx') ||
            src.includes('.jsx') ||
            src.includes('@vite') ||
            src.includes('node_modules')
          ) {
            child.type = 'module';
          }
        }
      }

      const originalAppendChild = Node.prototype.appendChild;
      Node.prototype.appendChild = function(child) {
        patchScript(child);
        try {
          return originalAppendChild.call(this, child);
        } catch (e) {
          if (e.message && (e.message.includes('Cannot use import statement') || e.message.includes('outside a module'))) {
             console.warn('Prevented appendChild error for script:', child.textContent || child.src);
             return child;
          }
          throw e;
        }
      };

      const originalInsertBefore = Node.prototype.insertBefore;
      Node.prototype.insertBefore = function(child, referenceNode) {
        patchScript(child);
        try {
          return originalInsertBefore.call(this, child, referenceNode);
        } catch (e) {
          if (e.message && (e.message.includes('Cannot use import statement') || e.message.includes('outside a module'))) {
             console.warn('Prevented insertBefore error for script:', child.textContent || child.src);
             return child;
          }
          throw e;
        }
      };

      window.onerror = function(message, source, lineno, colno, error) {
        if (message && (message.includes("Cannot use import statement") || message.includes("appendChild") || message.includes("insertBefore"))) {
          return true;
        }
      };
      window.addEventListener('error', function(e) {
        if (e.message && (e.message.includes("Cannot use import statement") || e.message.includes("appendChild") || e.message.includes("insertBefore"))) {
          e.preventDefault();
          e.stopImmediatePropagation();
        }
      });
      window.addEventListener('unhandledrejection', function(e) {
        if (e.reason && e.reason.message && (e.reason.message.includes("Cannot use import statement") || e.reason.message.includes("appendChild") || e.reason.message.includes("insertBefore"))) {
          e.preventDefault();
          e.stopImmediatePropagation();
        }
      });
    </script>
    

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
</head>
<body class="bg-black text-white selection:bg-blue-500/30">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
