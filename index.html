
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Установка цифровых игры на PlayStation</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM (UMD for browser usage without build) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@11/dist/framer-motion.js"></script>
    
    <!-- Babel Standalone (to compile JSX in browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #050505; 
            color: white; 
            scroll-behavior: smooth; 
        }
        .font-gaming { 
            font-family: 'Rajdhani', sans-serif; 
        }
        .ps-blue-glow { 
            box-shadow: 0 0 20px rgba(0, 112, 243, 0.4); 
        }
        .kaspi-red-badge { 
            background: linear-gradient(90deg, #ff0000 0%, #b30000 100%); 
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.3); }
            50% { opacity: 1; transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .animate-bounce-in { animation: bounceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #050505;
        }
        ::-webkit-scrollbar-thumb {
            background: #27272a;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3b82f6;
        }
    </style>
</head>
<body>
    <!-- Root Element -->
    <div id="root"></div>

    <!-- Main Application Script -->
    <script type="text/babel">
        // Global error handler
        window.onerror = function(message, source, lineno, colno, error) {
            console.error("Global script error:", { message, source, lineno, colno, error });
            return false;
        };

        const { useState, useEffect, useRef } = React;

        // --- CONSTANTS ---
        const WHATSAPP_PHONE = "77066386792"; 
        const INSTAGRAM_LINK = "https://www.instagram.com/dalagame.qz?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==";
        // Ссылка на CSV (Google Таблица должна быть опубликована: Файл -> Поделиться -> Опубликовать в интернете -> CSV)
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQJNJu3ItvN4gbicHMmBPMEuX0iKSoi30tYKpkEMgpFlbwNXEZcgNag9JA_-mreOgiiGh4_h8Bd4QJD/pub?gid=1418400211&single=true&output=csv";
        const DESC_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQJNJu3ItvN4gbicHMmBPMEuX0iKSoi30tYKpkEMgpFlbwNXEZcgNag9JA_-mreOgiiGh4_h8Bd4QJD/pub?gid=1350001392&single=true&output=csv";
        const USERS_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQJNJu3ItvN4gbicHMmBPMEuX0iKSoi30tYKpkEMgpFlbwNXEZcgNag9JA_-mreOgiiGh4_h8Bd4QJD/pub?gid=1959901530&single=true&output=csv";
        const REGISTER_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx7bkFGY5NpQxDeri2eRKL7GoGcsgLnrqGpY_SXX8t5k6NyAUTFQi8tWqAXPZFbWHDx/exec"; 
        const DEFAULT_AVATAR = "https://i.pinimg.com/564x/b2/0a/24/b20a2494ffe7f8f892073a342e75150b.jpg";
        
        const { motion, useAnimation, AnimatePresence } = typeof Motion !== 'undefined' ? Motion : { motion: null, useAnimation: () => ({}), AnimatePresence: null };

        // --- COMPONENTS ---

        const CaseOpening = ({ user, lang, onWinClaimed, onSpinStart, onWin, games }) => {
            const [spinning, setSpinning] = React.useState(false);
            const [result, setResult] = React.useState(null);
            const [items, setItems] = React.useState([]);
            const [translateX, setTranslateX] = React.useState(0);
            const [isAnimating, setIsAnimating] = React.useState(false);
            const [error, setError] = React.useState(null);
            const containerRef = React.useRef(null);
            
            const spinSound = React.useRef(new Audio("https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"));
            const winSound = React.useRef(new Audio("https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"));

            React.useEffect(() => {
                spinSound.current.loop = true;
                spinSound.current.volume = 0.5;
                winSound.current.volume = 0.7;
                return () => {
                    spinSound.current.pause();
                    winSound.current.pause();
                };
            }, []);

            const CASE_COST = 10000;
            const WHATSAPP_PHONE = "77066386792";

            const RANGES = [
                { 
                    id: 'low', 
                    name: lang === 'RU' ? "ГАРАНТИРОВАННЫЕ ПРИЗЫ" : "Кепілдендірілген сыйлықтар", 
                    chance: 85, 
                    color: "bg-zinc-800",
                    glow: "shadow-[0_0_15px_rgba(255,255,255,0.1)]",
                    image: "https://img.icons8.com/ios-filled/100/ffffff/controller.png",
                    minPrice: 0,
                    maxPrice: 7000,
                    value: 0
                },
                { 
                    id: 'mid', 
                    name: lang === 'RU' ? "Редкий приз" : "Сирек сыйлық", 
                    chance: 10, 
                    color: "bg-blue-900/40",
                    glow: "shadow-[0_0_20px_rgba(59,130,246,0.3)]",
                    image: "https://img.icons8.com/ios-filled/100/ffffff/trophy.png",
                    minPrice: 10000,
                    maxPrice: 12000,
                    value: 0
                },
                { 
                    id: 'super', 
                    name: lang === 'RU' ? "Супер-приз" : "Супер сыйлық", 
                    chance: 4, 
                    color: "bg-purple-900/40",
                    glow: "shadow-[0_0_25px_rgba(168,85,247,0.4)]",
                    image: "https://img.icons8.com/ios-filled/100/ffffff/crown.png",
                    minPrice: 15000,
                    maxPrice: 25000,
                    value: 0
                },
                { 
                    id: 'legendary', 
                    name: lang === 'RU' ? "Легендарный приз" : "Аңызға айналған сыйлық", 
                    chance: 1, 
                    color: "bg-yellow-600/40",
                    glow: "shadow-[0_0_30px_rgba(234,179,8,0.5)]",
                    image: "https://img.icons8.com/ios-filled/100/ffffff/diamond.png",
                    minPrice: 30000,
                    maxPrice: 100000,
                    value: 0
                }
            ];

            const generateItems = (count = 100) => {
                const pool = [];
                for (let i = 0; i < count; i++) {
                    const rand = Math.random() * 100;
                    let range;
                    if (rand < 85) range = RANGES[0];
                    else if (rand < 95) range = RANGES[1];
                    else if (rand < 99) range = RANGES[2];
                    else range = RANGES[3];
                    
                    pool.push({ ...range, spinId: i });
                }
                return pool;
            };

            React.useEffect(() => {
                if (items.length === 0) {
                    setItems(generateItems(30));
                }
            }, []);

            const handleSpin = async () => {
                if (spinning || isAnimating) return;
                if (!user) {
                    setError(lang === 'RU' ? "Пожалуйста, войдите в аккаунт" : "Жүйеге кіріңіз");
                    return;
                }
                
                const currentBalance = user.balance ?? 0;
                if (currentBalance < CASE_COST) {
                    setError(lang === 'RU' ? "Недостаточно средств. Пополните баланс!" : "Қаражат жеткіліксіз. Балансты толтырыңыз!");
                    return;
                }

                // 1. Reset state and start local deduction immediately for responsiveness
                setSpinning(true);
                setResult(null);
                setTranslateX(0);
                setIsAnimating(false);
                setError(null);
                
                if (onSpinStart) onSpinStart(CASE_COST);
                window.lastManualBalanceUpdate = Date.now();

                // 2. Prepare items for the spin
                const newItems = generateItems(120);
                setItems(newItems);

                // 3. Start the animation sequence with proper timing to ensure transition works
                // Small delay to ensure the reset to 0 and transition:none are applied by the browser
                await new Promise(r => setTimeout(r, 50));
                
                // Enable transition
                setIsAnimating(true);
                
                // Play spin sound
                spinSound.current.currentTime = 0;
                spinSound.current.play().catch(e => console.log("Audio play failed:", e));
                
                // Another small delay before changing transform to ensure transition:7s is active
                await new Promise(r => setTimeout(r, 50));
                
                const itemWidth = 166; 
                const winIndex = 100; 
                const containerWidth = containerRef.current ? containerRef.current.offsetWidth : (window.innerWidth || 1000);
                const randomOffset = Math.floor(Math.random() * 60) - 30; // Случайное смещение для реализма
                const offset = -(winIndex * itemWidth) + (containerWidth / 2) - (itemWidth / 2) - 16 + randomOffset;
                
                setTranslateX(offset);

                // 4. Set the win determination timeout (matches the 7s CSS transition)
                const winTimeout = setTimeout(() => {
                    const wonRange = newItems[winIndex];
                    
                    // Stop spin sound and play win sound
                    spinSound.current.pause();
                    winSound.current.currentTime = 0;
                    winSound.current.play().catch(e => console.log("Audio play failed:", e));

                    const finalWin = {
                        ...wonRange,
                        rangeName: wonRange.name,
                        name: wonRange.name, // Use range name as the item name
                        image: wonRange.image,
                        price: wonRange.value || 0
                    };

                    setResult(finalWin);
                    setSpinning(false);
                    setIsAnimating(false);
                    
                    // Save win automatically to database
                    saveWinToDatabase(finalWin);
                }, 7200);

                try {
                    // 5. Call the server in the background to sync the deduction
                    const response = await fetch(REGISTER_SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({
                            action: 'deductBalance',
                            email: user.email,
                            amount: CASE_COST
                        })
                    });
                    const data = await response.json();

                    if (data.status === 'error') {
                        console.error("Server-side balance deduction failed:", data.message);
                        // Note: In a real production app, we might want to cancel the win here,
                        // but for UX we let it finish and maybe show an error if it's critical.
                    }
                } catch (e) {
                    console.error("Network error during background deduction:", e);
                }
            };

            const saveWinToDatabase = async (win) => {
                console.log("Attempting to save win:", win);
                if (!user || !user.email) {
                    console.error("Cannot save win: User not logged in or email missing");
                    return;
                }
                try {
                    const response = await fetch(REGISTER_SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({
                            action: 'saveWin',
                            email: user.email,
                            win: win.name,
                            gameName: win.name,
                            winAmount: win.price,
                            type: 'Case'
                        })
                    });
                    const data = await response.json();
                    console.log("Save win response:", data);
                    if (data.status === 'success') {
                        // If server returns new balance, use it.
                        if (onWin && data.balance !== undefined) {
                            onWin(parseFloat(data.balance));
                        }
                    } else {
                        console.error("Failed to save win:", data.message);
                    }
                } catch (e) {
                    console.error("Error saving win:", e);
                }
            };

            const handleClaim = () => {
                if (!result) return;

                const winText = result.name;
                const email = user.email;
                const userId = user.id || '—';

                const message = lang === 'RU' 
                    ? `ВЫИГРЫШ В КЕЙСЕ!\n\nЯ выиграл категорию: ${winText}\n\nХочу выбрать игру из этой категории.\n\nМой ID: ${userId}\nEmail: ${email}`
                    : `КЕЙСТЕН ҰТЫС!\n\nМен мына категорияны ұттым: ${winText}\n\nОсы категориядан ойын таңдағым келеді.\n\nМенің ID: ${userId}\nEmail: ${email}`;
                
                const url = `https://api.whatsapp.com/send?phone=${WHATSAPP_PHONE}&text=${encodeURIComponent(message)}`;
                window.open(url, '_blank');

                if (onWinClaimed) onWinClaimed();
                setResult(null);
            };
            return (
                <div className="py-12 px-6 max-w-7xl mx-auto text-center animate-fade-in">
                    <div className="mb-12">
                        <h2 className="text-4xl md:text-6xl font-bold font-gaming uppercase mb-4 tracking-tighter">
                            Dala<span className="text-blue-500">Case</span>
                        </h2>
                        <p className="text-gray-400 text-lg max-w-2xl mx-auto font-medium">
                            @dalacase — гарантированная игра из выбранного диапазона!
                        </p>
                        <div className="mt-6 inline-flex items-center gap-3 bg-blue-600/10 border border-blue-500/30 px-8 py-3 rounded-2xl text-blue-400 font-bold shadow-[0_0_30px_rgba(37,99,235,0.1)]">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                            Стоимость: 10,000 ₸
                        </div>
                    </div>

                    <div ref={containerRef} className="relative h-56 bg-zinc-900/40 border-y border-white/5 overflow-hidden mb-16 flex items-center shadow-inner">
                        {/* Center Indicator */}
                        <div className="absolute left-1/2 top-0 bottom-0 w-1 bg-blue-500 z-30 shadow-[0_0_20px_rgba(59,130,246,1)] before:content-[''] before:absolute before:top-0 before:left-1/2 before:-translate-x-1/2 before:border-l-[10px] before:border-l-transparent before:border-r-[10px] before:border-r-transparent before:border-top-[10px] before:border-top-blue-500 after:content-[''] after:absolute after:bottom-0 after:left-1/2 after:-translate-x-1/2 after:border-l-[10px] after:border-l-transparent after:border-r-[10px] after:border-r-transparent after:border-bottom-[10px] after:border-bottom-blue-500"></div>
                        
                        {/* Roulette Items */}
                        <div 
                            className="flex gap-4 px-4"
                            style={{ 
                                display: 'flex', 
                                flexWrap: 'nowrap',
                                transform: `translateX(${translateX}px)`,
                                transition: isAnimating ? 'transform 7s cubic-bezier(0.1, 0, 0.1, 1)' : 'none'
                            }}
                        >
                            {items.map((item, i) => (
                                <div 
                                    key={i} 
                                    className={`min-w-[150px] h-36 ${item.color} ${item.glow} rounded-3xl border border-white/10 p-4 flex flex-col items-center justify-center gap-3 transition-all duration-500`}
                                >
                                    <img src={item.image} alt="" className="h-14 w-14 object-contain opacity-90 drop-shadow-lg" referrerPolicy="no-referrer" />
                                    <span className="text-[11px] font-black text-center leading-tight text-white uppercase tracking-tight">{item.name}</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    {!result && (
                        <div className="flex flex-col items-center gap-6 mb-12">
                            <button 
                                onClick={handleSpin}
                                disabled={spinning}
                                className={`group relative bg-blue-600 hover:bg-blue-700 text-white px-16 py-6 rounded-3xl font-black text-2xl transition-all shadow-[0_10px_40px_rgba(37,99,235,0.4)] hover:shadow-[0_15px_50px_rgba(37,99,235,0.6)] hover:scale-105 active:scale-95 disabled:opacity-50 disabled:scale-100 cursor-pointer overflow-hidden`}
                            >
                                <span className="relative z-10">
                                    {spinning ? (lang === 'RU' ? 'КРУТИМ...' : 'АЙНАЛУДА...') : (lang === 'RU' ? 'ОТКРЫТЬ КЕЙС' : 'КЕЙСТІ АШУ')}
                                </span>
                                <div className="absolute inset-0 bg-gradient-to-r from-white/0 via-white/20 to-white/0 -translate-x-full group-hover:translate-x-full transition-transform duration-1000"></div>
                            </button>
                            {error && (
                                <p className="text-red-500 font-bold text-lg animate-fade-in">{error}</p>
                            )}
                            <p className="text-zinc-500 text-sm font-bold uppercase tracking-widest">Шансы: 85% / 10% / 4% / 1%</p>
                        </div>
                    )}

                    <div className="max-w-4xl mx-auto mb-12 text-center">
                        <h2 className="text-xl md:text-2xl font-black text-white uppercase tracking-tight mb-6 px-4">
                            {lang === 'RU' ? "Каждый кейс — шанс забрать игру дороже, чем ты заплатил" : "Әрбір кейс — сіз төлегеннен қымбат ойынды алу мүмкіндігі"}
                        </h2>
                        
                        <div className="bg-white/5 backdrop-blur-md border border-white/10 rounded-[2.5rem] p-6 md:p-10 text-left mx-4">
                            <h3 className="text-xl font-bold text-blue-400 mb-4">
                                {lang === 'RU' ? "Что внутри кейса?" : "Кейс ішінде не бар?"}
                            </h3>
                            <p className="text-zinc-400 text-sm mb-8">
                                {lang === 'RU' ? "Каждое открытие — это шанс получить игру или даже что-то намного круче:" : "Әрбір ашылу — ойынды немесе одан да керемет нәрсені алу мүмкіндігі:"}
                            </p>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div className="space-y-3">
                                    <div className="flex items-center gap-3">
                                        <div className="w-3 h-3 rounded-full bg-zinc-500 shadow-[0_0_10px_rgba(113,113,122,0.5)]"></div>
                                        <span className="font-black text-zinc-300 uppercase tracking-tighter">
                                            {lang === 'RU' ? "ГАРАНТИРОВАННЫЕ ПРИЗЫ — 85%" : "Кепілдендірілген сыйлықтар — 85%"}
                                        </span>
                                    </div>
                                    <p className="text-xs text-zinc-500 leading-relaxed font-medium">
                                        {lang === 'RU' ? "Гарантированная игра на сумму кейса. Ты в любом случае не остаёшься без покупки!" : "Кейс сомасына кепілдендірілген ойын. Сіз кез келген жағдайда сатып алусыз қалмайсыз!"}
                                    </p>
                                </div>
                                
                                <div className="space-y-3">
                                    <div className="flex items-center gap-3">
                                        <div className="w-3 h-3 rounded-full bg-blue-500 shadow-[0_0_10px_rgba(59,130,246,0.5)]"></div>
                                        <span className="font-black text-blue-400 uppercase tracking-tighter">
                                            {lang === 'RU' ? "Редкие призы — 10%" : "Сирек сыйлықтар — 10%"}
                                        </span>
                                    </div>
                                    <p className="text-xs text-zinc-500 leading-relaxed font-medium">
                                        {lang === 'RU' ? "Игры более высокого ценового сегмента. Можно забрать тайтл дороже, чем заплатил." : "Жоғары баға сегментіндегі ойындар. Төлегеннен қымбат тайтлды алуға болады."}
                                    </p>
                                </div>
                                
                                <div className="space-y-3">
                                    <div className="flex items-center gap-3">
                                        <div className="w-3 h-3 rounded-full bg-purple-500 shadow-[0_0_10px_rgba(168,85,247,0.5)]"></div>
                                        <span className="font-black text-purple-400 uppercase tracking-tighter">
                                            {lang === 'RU' ? "Супер-призы — 4%" : "Супер сыйлықтар — 4%"}
                                        </span>
                                    </div>
                                    <p className="text-xs text-zinc-500 leading-relaxed font-medium">
                                        {lang === 'RU' ? "Новинки, предзаказы или подписка PlayStation Plus. Вот тут уже начинается настоящая удача." : "Жаңалықтар, алдын ала тапсырыстар немесе PlayStation Plus жазылымы. Міне, осы жерде нағыз сәттілік басталады."}
                                    </p>
                                </div>
                                
                                <div className="space-y-3">
                                    <div className="flex items-center gap-3">
                                        <div className="w-3 h-3 rounded-full bg-yellow-500 shadow-[0_0_10px_rgba(234,179,8,0.5)]"></div>
                                        <span className="font-black text-yellow-400 uppercase tracking-tighter">
                                            {lang === 'RU' ? "Легендарный приз — 1%" : "Аңызға айналған сыйлық — 1%"}
                                        </span>
                                    </div>
                                    <p className="text-xs text-zinc-500 leading-relaxed font-medium">
                                        {lang === 'RU' ? "Никто не знает, что здесь, но говорят — нечто классное!" : "Мұнда не бар екенін ешкім білмейді, бірақ өте керемет нәрсе дейді!"}
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>

                    {result && (
                        <motion.div 
                            initial={{ opacity: 0, scale: 0.5, y: 50 }}
                            animate={{ opacity: 1, scale: 1, y: 0 }}
                            className="relative z-40"
                        >
                            <div className="bg-zinc-900/95 backdrop-blur-3xl border-2 border-yellow-500/50 rounded-[3rem] p-12 max-w-md mx-auto mb-8 shadow-[0_0_150px_rgba(234,179,8,0.3)] relative overflow-hidden">
                                {/* Decorative elements */}
                                <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-transparent via-yellow-400 to-transparent animate-shimmer"></div>
                                <div className="absolute -top-24 -right-24 w-48 h-48 bg-yellow-500/10 rounded-full blur-3xl"></div>
                                <div className="absolute -bottom-24 -left-24 w-48 h-48 bg-blue-500/10 rounded-full blur-3xl"></div>

                                <div className="text-yellow-400 text-sm font-black uppercase tracking-[0.3em] mb-8 animate-pulse">
                                    {lang === 'RU' ? "ПОЗДРАВЛЯЕМ! ВЫ МОЖЕТЕ ВЫБРАТЬ ЛЮБУЮ ИГРУ ИЗ КАТЕГОРИИ:" : "ҚҰТТЫҚТАЙМЫЗ! СІЗ МЫНА КАТЕГОРИЯДАН КЕЗ КЕЛГЕН ОЙЫНДЫ ТАҢДАЙ АЛАСЫЗ:"}
                                </div>

                                <motion.div

                const file = e.target.files[0];
                if (file) {
                    if (file.size > 5 * 1024 * 1024) { // 5MB limit for selection
                        setStatus({ 
                            type: 'error', 
                            message: lang === 'RU' ? 'Файл слишком большой (макс. 5МБ)' : 'Файл тым үлкен (макс. 5МБ)' 
                        });
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 200;
                            const MAX_HEIGHT = 200;
                            let width = img.width;
                            let height = img.height;

                            if (width > height) {
                                if (width > MAX_WIDTH) {
                                    height *= MAX_WIDTH / width;
                                    width = MAX_WIDTH;
                                }
                            } else {
                                if (height > MAX_HEIGHT) {
                                    width *= MAX_HEIGHT / height;
                                    height = MAX_HEIGHT;
                                }
                            }

                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            const dataUrl = canvas.toDataURL('image/jpeg', 0.7); // Compress to JPEG
                            setFormData(prev => ({ ...prev, avatar: dataUrl }));
                        };
                        img.src = event.target.result;
