        // --- UTILS ---
        const parseCSV = (csvText) => {
            const rows = [];
            let currentRow = [];
            let currentField = '';
            let inQuotes = false;
            
            for (let i = 0; i < csvText.length; i++) {
                const char = csvText[i];
                const nextChar = csvText[i + 1];
                
                if (char === '"') {
                    if (inQuotes && nextChar === '"') {
                        currentField += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    currentRow.push(currentField.trim());
                    currentField = '';
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (currentField || currentRow.length > 0) {
                        currentRow.push(currentField.trim());
                        if (currentRow.some(c => c !== '')) rows.push(currentRow);
                        currentRow = [];
                        currentField = '';
                    }
                    if (char === '\r' && nextChar === '\n') i++;
                } else {
                    currentField += char;
                }
            }
            if (currentField || currentRow.length > 0) {
                currentRow.push(currentField.trim());
                if (currentRow.some(c => c !== '')) rows.push(currentRow);
            }
            return rows;
        };

        const App = () => {
            const [lang, setLang] = useState('RU');
            const [selectedCategories, setSelectedCategories] = useState(['Все']);
            const [selectedPlatform, setSelectedPlatform] = useState(null);
            const [selectionStep, setSelectionStep] = useState(1); // 1: platform, 2: catalog type, 3: content
            const [activeView, setActiveView] = useState('catalog'); // 'catalog' or 'subscriptions'
            const [searchQuery, setSearchQuery] = useState('');
            const [games, setGames] = useState([]);
            const [categories, setCategories] = useState(['Все']); // Динамические категории
            const [descriptions, setDescriptions] = useState([]);
            const [subscriptions, setSubscriptions] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [welcomeMessage, setWelcomeMessage] = useState("Здравствуйте! Пишу с сайта Dala Game.");

            const handlePlatformSelect = (platform) => {
                setSelectedPlatform(platform);
                setSelectionStep(2);
            };

            const handleCatalogSelect = (destination) => {
                setActiveView(destination);
                setSelectionStep(3);
                setTimeout(() => {
                    const section = document.getElementById(destination);
                    if (section) section.scrollIntoView({ behavior: 'smooth' });
                }, 100);
            };

            const resetSelection = () => {
                setSelectedPlatform(null);
                setSelectionStep(1);
                setActiveView(null);
                setSearchQuery('');
                setSelectedCategories(['Все']);
                setTimeout(() => {
                    const section = document.getElementById('catalog');
                    if (section) section.scrollIntoView({ behavior: 'smooth' });
                }, 100);
            };

            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [isRegisterOpen, setIsRegisterOpen] = useState(false);
            const [isLoginOpen, setIsLoginOpen] = useState(false);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [isInfoOpen, setIsInfoOpen] = useState(false);
            const [isRechargeOpen, setIsRechargeOpen] = useState(false);
            const [user, setUser] = useState(null);
            const [selectedGame, setSelectedGame] = useState(null);

            const fetchWithTimeout = async (url, name) => {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 12000);

                try {
                    // Используем максимально простой fetch без лишних заголовков для Google Sheets
                    const res = await fetch(url, {
                        method: 'GET',
                        signal: controller.signal
                    });
                    
                    clearTimeout(timeoutId);
                    
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    
                    const text = await res.text();
                    if (text.trim().startsWith('<html') || text.trim().startsWith('<!DOCTYPE')) {
                        throw new Error("HTML_RESPONSE");
                    }
                    return text;
                } catch (e) {
                    clearTimeout(timeoutId);
                    console.error(`[Fetch Error] ${name}:`, e);
                    
                    if (e.name === 'AbortError') throw new Error("Тайм-аут (медленный интернет)");
                    if (e.message === "HTML_RESPONSE") throw new Error("Лист не опубликован как CSV");
                    
                    throw new Error("Ошибка сети или блокировка CORS. Проверьте публикацию таблицы.");
                }
            };

            // Load user from localStorage on mount
            useEffect(() => {
                const savedUser = localStorage.getItem('dalagame_user');
                if (savedUser) {
                    try {
                        const parsed = JSON.parse(savedUser);
                        if (!parsed.avatar) parsed.avatar = DEFAULT_AVATAR;
                        setUser(parsed);
                    } catch (e) {
                        console.error("Error parsing saved user");
                    }
                }
            }, []);

            // Real-time balance sync from Google Apps Script (More reliable than CSV)
            useEffect(() => {
                if (!user || !user.email) return;

                const syncBalance = async () => {
                    // Если была ручная прокрутка недавно, не синхронизируем, чтобы не перезаписать старыми данными
                    if (window.lastManualBalanceUpdate && (Date.now() - window.lastManualBalanceUpdate < 15000)) {
                        return;
                    }

                    try {
                        const response = await fetch(REGISTER_SCRIPT_URL, {
                            method: 'POST',
                            body: JSON.stringify({
                                action: 'getBalance',
                                email: user.email
                            })
                        });
                        
                        if (!response.ok) return;
                        
                        const data = await response.json();
                        
                        if ((data.status === 'success' || data.success) && data.balance !== undefined) {
                            const newBalance = parseFloat(data.balance);
                            
                            if (isNaN(newBalance)) return;

                            setUser(prev => {
                                if (!prev) return null;
                                // Если баланс не изменился, не обновляем стейт
                                if (prev.balance === newBalance) return prev;
                                
                                // Если была ручная прокрутка недавно, не синхронизируем
                                if (window.lastManualBalanceUpdate && (Date.now() - window.lastManualBalanceUpdate < 15000)) return prev;
                                
                                console.log(`[Баланс] Обновлен через API: ${newBalance} (было ${prev.balance})`);
                                const updated = { ...prev, balance: newBalance };
                                localStorage.setItem('dalagame_user', JSON.stringify(updated));
                                return updated;
                            });
                        }
                    } catch (e) {
                        console.error("Ошибка синхронизации баланса через API:", e.message);
                    }
                };

                // Initial sync
                syncBalance();

                // Periodic sync every 15 seconds (less frequent to avoid rate limits)
                const interval = setInterval(syncBalance, 15000);
                return () => clearInterval(interval);
            }, [user?.email, user?.id]);

            const handleCategoryToggle = (cat) => {
                if (cat === 'Все') {
                    setSelectedCategories(['Все']);
                    return;
                }

                setSelectedCategories(prev => {
                    let newCats = prev.includes(cat) 
                        ? prev.filter(c => c !== cat) 
                        : [...prev.filter(c => c !== 'Все'), cat];
                    
                    if (newCats.length === 0) {
                        return ['Все'];
                    }
                    return newCats;
                });
            };

            useEffect(() => {
                const fetchData = async () => {
                    try {
                        console.log('Начало загрузки данных...');
                        
                        const [gamesData, descData] = await Promise.all([
                            fetchWithTimeout(SHEET_URL, 'Игры'),
                            fetchWithTimeout(DESC_SHEET_URL, 'Описания')
                        ]);
                        
                        console.log('Данные успешно получены');
                        
                        // Парсим CSV описаний и подписок
                        const descRows = parseCSV(descData).slice(1);
                        let fetchedWelcomeMessage = null;
                        const parsedDesc = [];
                        const parsedSubs = [];

                        descRows.forEach((cols, index) => {
                            // Колонка A (0) - описания
                            if (cols[0]) {
                                parsedDesc.push(cols[0].replace(/^"|"$/g, '').trim());
                            }
                            // Колонка B (1) - приветственное сообщение
                            if (cols[1] && !fetchedWelcomeMessage) {
                                fetchedWelcomeMessage = cols[1].replace(/^"|"$/g, '').trim();
                            }
                            // Колонка C (2) и далее - подписки
                            const subName = cols[2]?.replace(/^"|"$/g, '').trim();
                            if (subName) {
                                const discountPS4String = cols[3] || '';
                                const discountPS5String = cols[4] || '';
                                const pricePS5String = cols[5] || '0';
                                const pricePS4String = cols[6] || '0';
                                const image = cols[7] || '';
                                const description = cols[8] || '';

                                let discountPS4 = 0;
                                const discountPS4Num = parseInt(discountPS4String.replace(/\D/g, ''), 10);
                                if (!isNaN(discountPS4Num) && discountPS4Num > 0 && discountPS4Num <= 100) {
                                    discountPS4 = discountPS4Num;
                                }

                                let discountPS5 = 0;
                                const discountPS5Num = parseInt(discountPS5String.replace(/\D/g, ''), 10);
                                if (!isNaN(discountPS5Num) && discountPS5Num > 0 && discountPS5Num <= 100) {
                                    discountPS5 = discountPS5Num;
                                }

                                const pricePS5 = parseInt(pricePS5String.replace(/\D/g, '')) || 0;
                                const pricePS4 = parseInt(pricePS4String.replace(/\D/g, '')) || 0;

                                parsedSubs.push({
                                    id: `sub-${index}`,
                                    name: subName,
                                    pricePS5,
                                    pricePS4,
                                    image,
                                    categories: ['Подписки'],
                                    categoryDisplay: 'Подписки',
                                    description,
                                    isNew: false,
                                    discountPS4,
                                    discountPS5
                                });
                            }
                        });

                        setDescriptions(parsedDesc);
                        if (fetchedWelcomeMessage) {
                            setWelcomeMessage(fetchedWelcomeMessage);
                        }
                        setSubscriptions(parsedSubs);
                        
                        const rows = parseCSV(gamesData).slice(1); // Пропускаем заголовок
                        
                        const parsed = rows.filter(cols => cols.length > 1 && cols[0]).map((cols, index) => {
                            const name = cols[0] || 'Без названия';
                            const discountPS4String = cols[1] || '';
                            const discountPS5String = cols[2] || '';
                            const pricePS5String = cols[3] || '0';
                            const pricePS4String = cols[4] || '0';
                            const image = cols[5] || '';
                            const description = cols[6] || '';
                            
                            let discountPS4 = 0;
                            const discountPS4Num = parseInt(discountPS4String.replace(/\D/g, ''), 10);
                            if (!isNaN(discountPS4Num) && discountPS4Num > 0 && discountPS4Num <= 100) {
                                discountPS4 = discountPS4Num;
                            }

                            let discountPS5 = 0;
                            const discountPS5Num = parseInt(discountPS5String.replace(/\D/g, ''), 10);
                            if (!isNaN(discountPS5Num) && discountPS5Num > 0 && discountPS5Num <= 100) {
                                discountPS5 = discountPS5Num;
                            }

                            // Считываем жанры из колонок 8 и далее (индексы 7+)
                            // Исключаем колонку L (индекс 11), так как это статус предзаказа, а не жанр
                            const rawCats = cols.slice(7).filter((_, i) => (i + 7) !== 11);
                            const categories = rawCats
                                .filter(c => c && c.toLowerCase() !== 'playstation');

                            // Проверка на предзаказ (Колонка L - индекс 11)
                            const isPreOrder = !!(cols[11] && cols[11].trim());
                            if (isPreOrder) {
                                if (!categories.includes('Предзаказ')) {
                                    categories.unshift('Предзаказ');
                                }
                            }

                            // Проверка на наличие (Колонка AF - индекс 31)
                            const outOfStock = !!(cols[31] && cols[31].trim() !== '');

                            // Для отображения на карточке объединяем через разделитель
                            const categoryDisplay = categories.join(' • ');

                            // Чистим цены
                            const pricePS5 = parseInt(pricePS5String.replace(/\D/g, '')) || 0;
                            const pricePS4 = parseInt(pricePS4String.replace(/\D/g, '')) || 0;

                            return {
                                id: `game-${index}`,
                                name,
                                pricePS5,
                                pricePS4,
                                image,
                                categories, // Массив жанров для фильтрации
                                categoryDisplay, // Строка для отображения
                                description, // Описание игры
                                isNew: index < 3,
                                isPreOrder: isPreOrder,
                                outOfStock: outOfStock,
                                discountPS4,
                                discountPS5
                            };
                        });
                        
                        setGames(parsed);

                        // Собираем уникальные жанры из всех колонок всех игр
                        const allCats = parsed.flatMap(g => g.categories);
                        const uniqueCats = Array.from(new Set(allCats))
                            .filter(c => c !== 'Предзаказ')
                            .sort();
                        
                        setCategories(['Все', 'Предзаказ', 'Акции', ...uniqueCats]);

                        setLoading(false);
                    } catch (error) {
                        console.error("Error fetching sheet:", error);
                        setError(`Не удалось загрузить данные из Google Таблицы: ${error.message}. Пожалуйста, убедитесь, что таблица опубликована как CSV и у вас есть интернет.`);
                        setLoading(false);
                    }
                };

                fetchData();
            }, []);

            const filteredGames = games.filter(game => {
                // Фильтр по платформе (если выбрана)
                if (selectedPlatform) {
                    if (selectedPlatform === 'PlayStation 5' && (!game.pricePS5 || game.pricePS5 === 0)) return false;
                    if (selectedPlatform === 'PlayStation 4' && (!game.pricePS4 || game.pricePS4 === 0)) return false;
                }
                
                // Фильтр по категориям
                if (!selectedCategories.includes('Все')) {
                    // Проверка на Акции
                    if (selectedCategories.includes('Акции')) {
                        const currentDiscount = selectedPlatform === 'PlayStation 5' ? game.discountPS5 : game.discountPS4;
                        if (!(currentDiscount > 0)) return false;
                    }

                    // Проверка на Предзаказ
                    if (selectedCategories.includes('Предзаказ')) {
                        if (!game.isPreOrder) return false;
                    }
                    
                    // Проверка на остальные жанры (ИЛИ)
                    const selectedGenres = selectedCategories.filter(c => c !== 'Акции' && c !== 'Предзаказ');
                    if (selectedGenres.length > 0) {
                        const hasMatch = selectedGenres.some(genre => game.categories.includes(genre));
                        if (!hasMatch) return false;
                    }
                }
                
                // Фильтр по поиску (название игры)
                if (searchQuery.trim() !== '') {
                    if (!game.name.toLowerCase().includes(searchQuery.toLowerCase())) return false;
                }
                
                return true;
            }).map(game => {
                const basePrice = selectedPlatform === 'PlayStation 5' ? game.pricePS5 : game.pricePS4;
                const discount = selectedPlatform === 'PlayStation 5' ? game.discountPS5 : game.discountPS4;
                const finalPrice = discount > 0 ? Math.round(basePrice * (1 - discount / 100)) : basePrice;
                
                return {
                    ...game,
                    basePrice,
                    discount,
                    isSale: discount > 0,
                    price: finalPrice
                };
            });

            const handleOrderGeneral = () => {
                const message = "Здравствуйте! Хочу узнать насчет рассрочки.";
                const url = "https://api.whatsapp.com/send?phone=" + WHATSAPP_PHONE + "&text=" + encodeURIComponent(message);
                window.open(url, '_blank');
            };

            const addToCart = (game, platform) => {
                setCart([...cart, { ...game, platform }]);
                setIsCartOpen(true);
            };

            const removeFromCart = (index) => {
                setCart(cart.filter((_, i) => i !== index));
            };

            const checkoutCart = () => {
                if (cart.length === 0) return;
                
                let message = `${welcomeMessage}\n\nХочу приобрести следующие игры:\n\n`;
                let total = 0;
                cart.forEach((item, i) => {
                    message += `${i + 1}. ${item.name} (${item.platform}) - ${item.price} ₸\n`;
                    total += item.price;
                });
                message += `\nИтого: ${total} ₸`;
                const url = "https://api.whatsapp.com/send?phone=" + WHATSAPP_PHONE + "&text=" + encodeURIComponent(message);
                window.open(url, '_blank');
            };

            const handleRegister = async (userData) => {
                try {
                    // Генерируем 6-значный случайный ID
                    const randomId = Math.floor(100000 + Math.random() * 900000).toString();
                    const dataWithId = { 
                        ...userData, 
                        id: randomId,
                        avatar: userData.avatar || DEFAULT_AVATAR
                    };

                    console.log("Attempting registration with URL:", REGISTER_SCRIPT_URL);
                    
                    const response = await fetch(REGISTER_SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'register', ...dataWithId })
                    });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    
                    const result = await response.json();
                    console.log("Registration result:", result);
                    
                    // Преобразуем success в status для совместимости с UI
                    const finalResult = {
                        ...result,
                        status: result.status || (result.success ? 'success' : 'error')
                    };

                    if (finalResult.status === 'success' && finalResult.user) {
                        // Automatically log in after registration
                        setUser(finalResult.user);
                        localStorage.setItem('dalagame_user', JSON.stringify(finalResult.user));
                    }
                    
                    return finalResult;
                } catch (error) {
                    console.error("Registration error details:", error);
                    let msg = error.message || "Ошибка регистрации";
                    if (msg === "Failed to fetch") {
                        msg = "Ошибка сети (Failed to fetch). Убедитесь, что ссылка на скрипт верна, он развернут как 'Веб-приложение' и доступ открыт для 'Всех' (Anyone).";
                    }
                    return { status: 'error', message: msg };
                }
            };

            const handleLogin = async (credentials) => {
                try {
                    console.log("Attempting login with URL:", REGISTER_SCRIPT_URL);
                    
                    const response = await fetch(REGISTER_SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ ...credentials, action: 'login' })
                    });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    
                    const result = await response.json();
                    console.log("Login result:", result);
                    
                    // Преобразуем success в status для совместимости с UI
                    const finalResult = {
                        ...result,
                        status: result.status || (result.success ? 'success' : 'error')
                    };

                    if (finalResult.status === 'success' && finalResult.user) {
                        const userWithAvatar = {
                            ...finalResult.user,
                            avatar: finalResult.user.avatar || DEFAULT_AVATAR
                        };
                        setUser(userWithAvatar);
                        localStorage.setItem('dalagame_user', JSON.stringify(userWithAvatar));
                    }
                    
                    return finalResult;
                } catch (error) {
                    console.error("Login error details:", error);
                    let msg = error.message || "Ошибка входа";
                    if (msg === "Failed to fetch") {
                        msg = "Ошибка сети (Failed to fetch). Проверьте ссылку на скрипт и доступ 'Anyone'.";
                    }
                    return { status: 'error', message: msg };
                }
            };

            const handleLogout = () => {
                setUser(null);
                localStorage.removeItem('dalagame_user');
            };

            const handleUpdateProfile = async (formData) => {
                try {
                    const payload = JSON.stringify({ 
                        action: 'updateProfile', 
                        email: user.email, 
                        ...formData 
                    });
                    console.log("Updating profile, payload size:", (payload.length / 1024).toFixed(2), "KB");
                    
                    const response = await fetch(REGISTER_SCRIPT_URL, {
                        method: 'POST',
                        body: payload
                    });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    
                    const result = await response.json();
                    
                    // Преобразуем success в status для совместимости с UI
                    const finalResult = {
                        ...result,
                        status: result.status || (result.success ? 'success' : 'error')
                    };

                    if (finalResult.status === 'success') {
                        const updatedUser = { 
                            ...user, 
                            name: formData.name,
                            nickname: formData.nickname,
                            email: formData.email,
                            phone: formData.phone,
                            avatar: formData.avatar
                        };
                        setUser(updatedUser);
                        localStorage.setItem('dalagame_user', JSON.stringify(updatedUser));
                    }
                    
                    return finalResult;
                } catch (error) {
                    console.error("Update profile error details:", error);
                    let msg = error.message || "Ошибка обновления профиля";
                    if (msg === "Failed to fetch") {
                        msg = "Ошибка сети (Failed to fetch). Проверьте интернет-соединение или размер файла аватара. Если вы используете VPN, попробуйте отключить его.";
                    }
                    return { status: 'error', message: msg };
                }
            };

            return (
                <div className="min-h-screen">
                    <Navbar 
                        cartCount={cart.length} 
                        onOpenCart={() => setIsCartOpen(true)} 
                        onOpenRegister={() => {
                            setIsLoginOpen(false);
                            setIsRegisterOpen(true);
                        }}
                        onOpenLogin={() => {
                            setIsRegisterOpen(false);
                            setIsLoginOpen(true);
                        }}
                        onResetSelection={resetSelection} 
                        lang={lang} 
                        setLang={setLang} 
                        user={user}
                        onLogout={handleLogout}
                        onOpenSettings={() => setIsSettingsOpen(true)}
                        onOpenInfo={() => setIsInfoOpen(true)}
                        onOpenRecharge={() => setIsRechargeOpen(true)}
                        onOpenCase={() => {
                            setSelectionStep(1);
                            setActiveView(null);
                            setTimeout(() => {
                                document.getElementById('case-section')?.scrollIntoView({ behavior: 'smooth' });
                            }, 100);
                        }}
                    />
                    <Cart 
                        isOpen={isCartOpen} 
                        onClose={() => setIsCartOpen(false)} 
                        cart={cart} 
                        onRemove={removeFromCart} 
                        onCheckout={checkoutCart} 
                        lang={lang}
                    />

                    <RegisterModal 
                        isOpen={isRegisterOpen}
                        onClose={() => setIsRegisterOpen(false)}
                        onRegister={handleRegister}
                        onSwitchToLogin={() => {
                            setIsRegisterOpen(false);
                            setIsLoginOpen(true);
                        }}
                        lang={lang}
                    />
                    <LoginModal 
                        isOpen={isLoginOpen}
                        onClose={() => setIsLoginOpen(false)}
                        onLogin={handleLogin}
                        onSwitchToRegister={() => {
                            setIsLoginOpen(false);
                            setIsRegisterOpen(true);
                        }}
                        lang={lang}
                    />
                    <SettingsModal 
                        isOpen={isSettingsOpen}
                        onClose={() => setIsSettingsOpen(false)}
                        user={user}
                        onUpdateProfile={handleUpdateProfile}
                        lang={lang}
                    />
                    <InfoModal 
                        isOpen={isInfoOpen}
                        onClose={() => setIsInfoOpen(false)}
                        user={user}
                        lang={lang}
                    />
                    <RechargeModal 
                        isOpen={isRechargeOpen}
                        onClose={() => setIsRechargeOpen(false)}
                        user={user}
                        lang={lang}
                    />
                    <GameModal 
                        game={selectedGame} 
                        selectedPlatform={selectedPlatform} 
                        onClose={() => setSelectedGame(null)} 
                        onAddToCart={addToCart} 
                        lang={lang}
                    />
                    <Hero descriptions={descriptions} loading={loading} lang={lang} />

                    {/* Catalog Section */}
                    <section id="catalog" className="py-24 px-6 max-w-7xl mx-auto min-h-screen">
                        {selectionStep === 1 ? (
                            <div className="flex flex-col items-center justify-center py-20 animate-fade-in">
                                <h2 className="text-4xl md:text-6xl font-bold font-gaming uppercase mb-12 text-center">
                                    Какая у тебя <span className="text-blue-500">приставка?</span>
                                </h2>
                                <div className="flex flex-col md:flex-row gap-8 w-full max-w-4xl justify-center">
                                    <button 
                                        onClick={() => handlePlatformSelect('PlayStation 4')}
                                        className="group relative flex-1 bg-zinc-900/50 border border-white/10 rounded-[2.5rem] p-12 hover:bg-blue-600 hover:border-blue-500 transition-all duration-500 hover:scale-105 hover:shadow-[0_0_50px_rgba(37,99,235,0.3)] cursor-pointer"
                                    >
                                        <div className="mb-8 h-24 flex items-center justify-center group-hover:scale-110 transition-transform">
                                            <img 
                                                src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/00/PlayStation_logo.svg/250px-PlayStation_logo.svg.png" 
                                                alt="PlayStation 4" 
                                                className="h-full object-contain brightness-0 invert opacity-80 group-hover:opacity-100 transition-opacity" 
                                                referrerPolicy="no-referrer"
                                            />
                                        </div>
                                        <h3 className="text-3xl font-bold font-gaming uppercase tracking-widest text-white">PlayStation 4</h3>
                                        <div className="absolute inset-0 bg-blue-600/10 opacity-0 group-hover:opacity-100 rounded-[2.5rem] transition-opacity"></div>
                                    </button>
                                    <button 
                                        onClick={() => handlePlatformSelect('PlayStation 5')}
                                        className="group relative flex-1 bg-white text-black border border-white/10 rounded-[2.5rem] p-12 hover:bg-gray-100 hover:border-gray-300 transition-all duration-500 hover:scale-105 hover:shadow-[0_0_50px_rgba(255,255,255,0.5)] cursor-pointer"
                                    >
                                        <div className="mb-8 h-24 flex items-center justify-center group-hover:scale-110 transition-transform">
                                            <img 
                                                src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/00/PlayStation_logo.svg/250px-PlayStation_logo.svg.png" 
                                                alt="PlayStation 5" 
                                                className="h-full object-contain brightness-0 opacity-80 group-hover:opacity-100 transition-opacity" 
                                                referrerPolicy="no-referrer"
                                            />
                                        </div>
                                        <h3 className="text-3xl font-bold font-gaming uppercase tracking-widest">PlayStation 5</h3>
                                    </button>
                                </div>

                                {/* Case Section in Step 1 */}
                                <div id="case-section" className="mt-12 w-full max-w-4xl">
                                    <CaseOpening 
                                        user={user} 
                                        lang={lang} 
                                        games={games} 
                                        onSpinStart={(cost) => {
                                            setUser(prev => {
                                                if (!prev) return null;
                                                const updated = { ...prev, balance: (prev.balance ?? 0) - cost };
                                                localStorage.setItem('dalagame_user', JSON.stringify(updated));
                                                return updated;
                                            });
                                            window.lastManualBalanceUpdate = Date.now();
                                        }} 
                                        onWin={(totalAmount) => {
                                            setUser(prev => {
                                                if (!prev) return null;
                                                const updated = { ...prev, balance: totalAmount };
                                                localStorage.setItem('dalagame_user', JSON.stringify(updated));
                                                return updated;
                                            });
                                            window.lastManualBalanceUpdate = Date.now();
                                        }}
                                    />
                                </div>
                            </div>
                        ) : selectionStep === 2 ? (
                            <div className="flex flex-col items-center justify-center py-20 animate-fade-in">
                                <button 
                                    onClick={resetSelection}
                                    className="text-gray-500 hover:text-white mb-8 flex items-center gap-2 text-sm uppercase tracking-widest transition-colors cursor-pointer"
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                                    Назад к выбору приставки
                                </button>
                                <h2 className="text-4xl md:text-6xl font-bold font-gaming uppercase mb-12 text-center">
                                    Что вас <span className="text-blue-500">интересует?</span>
                                </h2>
                                <div className="flex flex-col md:flex-row gap-8 w-full max-w-4xl justify-center">
                                    <button 
                                        onClick={() => handleCatalogSelect('catalog')}
                                        className="group relative flex-1 bg-blue-600 border border-blue-500 rounded-[2.5rem] p-12 hover:bg-blue-500 transition-all duration-500 hover:scale-105 hover:shadow-[0_0_50px_rgba(37,99,235,0.5)] cursor-pointer flex flex-col items-center justify-center"
                                    >
                                        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-white mb-6">
                                            <line x1="6" y1="12" x2="10" y2="12"></line>
                                            <line x1="8" y1="10" x2="8" y2="14"></line>
                                            <circle cx="16" cy="12" r="1.5"></circle>
                                            <rect x="2" y="6" width="20" height="12" rx="2"></rect>
                                        </svg>
                                        <h3 className="text-3xl font-bold font-gaming uppercase tracking-widest text-white">Каталог игр</h3>
                                    </button>
                                    <button 
                                        onClick={() => handleCatalogSelect('subscriptions')}
                                        className="group relative flex-1 bg-zinc-800 border border-white/10 rounded-[2.5rem] p-12 hover:bg-yellow-500 transition-all duration-500 hover:scale-105 hover:shadow-[0_0_50px_rgba(234,179,8,0.5)] cursor-pointer flex flex-col items-center justify-center"
                                    >
                                        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-white mb-6 group-hover:text-black transition-colors"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="M6 8h.01"/><path d="M10 8h.01"/><path d="M14 8h.01"/><path d="M18 8h.01"/><path d="M8 12h8"/><path d="M10 16h4"/></svg>
                                        <h3 className="text-3xl font-bold font-gaming uppercase tracking-widest text-white group-hover:text-black transition-colors">Каталог подписок</h3>
                                    </button>
                                </div>
                            </div>
                        ) : activeView === 'catalog' ? (
                            <div className="animate-fade-in">
                                <div className="flex flex-col md:flex-row items-end justify-between mb-12 gap-8">
                                    <div>
                                        <button 
                                            onClick={resetSelection}
                                            className="text-gray-500 hover:text-white mb-4 flex items-center gap-2 text-xs uppercase tracking-widest transition-colors cursor-pointer"
                                        >
                                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                                            Сменить консоль
                                        </button>
                                        <h2 className="text-5xl font-bold font-gaming uppercase tracking-tight mb-4">
                                            Игры на <span className="text-blue-500">{selectedPlatform}</span>
                                        </h2>
                                        <div className="h-1.5 w-24 bg-blue-600 rounded-full shadow-[0_0_10px_rgba(59,130,246,0.5)]"></div>
                                    </div>
                                    
                                    <div className="flex flex-col gap-4">
                                        <div className="relative w-full md:w-80">
                                            <input 
                                                type="text" 
                                                placeholder="Поиск игр..." 
                                                value={searchQuery}
                                                onChange={(e) => setSearchQuery(e.target.value)}
                                                className="w-full bg-zinc-900 border border-white/10 rounded-xl py-3 pl-10 pr-4 text-sm text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all"
                                            />
                                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                                        </div>
                                        <div className="flex flex-wrap gap-2">
                                            {/* Основные категории */}
                                            <div className="flex flex-wrap gap-2 w-full mb-2 pb-2 border-b border-white/5">
                                                {categories.filter(c => ['Все', 'Предзаказ', 'Акции'].includes(c)).map(cat => {
                                                    const isSaleCat = cat === 'Акции';
                                                    const isPreOrderCat = cat === 'Предзаказ';
                                                    const isActive = selectedCategories.includes(cat);
                                                    
                                                    let btnClass = 'px-6 py-2 rounded-xl text-xs font-bold transition-all uppercase tracking-widest cursor-pointer ';
                                                    
                                                    if (isSaleCat) {
                                                        btnClass += isActive 
                                                            ? 'bg-red-600 text-white shadow-[0_5px_15px_rgba(220,38,38,0.4)]' 
                                                            : 'bg-zinc-900 text-red-500 hover:text-red-400 border border-red-500/30 hover:border-red-500/60';
                                                    } else if (isPreOrderCat) {
                                                        btnClass += isActive 
                                                            ? 'bg-blue-500 text-white shadow-[0_5px_15px_rgba(59,130,246,0.4)]' 
                                                            : 'bg-zinc-900 text-blue-400 hover:text-blue-300 border border-blue-500/30 hover:border-blue-500/60';
                                                    } else {
                                                        btnClass += isActive 
                                                            ? 'bg-blue-600 text-white shadow-[0_5px_15px_rgba(59,130,246,0.4)]' 
                                                            : 'bg-zinc-900 text-gray-500 hover:text-white border border-white/5';
                                                    }

                                                    return (
                                                        <button
                                                            key={cat}
                                                            onClick={() => handleCategoryToggle(cat)}
                                                            className={btnClass}
                                                        >
                                                            {cat}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                            
                                            {/* Остальные жанры */}
                                            <div className="flex flex-wrap gap-2">
                                                {categories.filter(c => !['Все', 'Предзаказ', 'Акции'].includes(c)).map(cat => {
                                                    const isActive = selectedCategories.includes(cat);
                                                    let btnClass = 'px-6 py-2 rounded-xl text-xs font-bold transition-all uppercase tracking-widest cursor-pointer ';
                                                    
                                                    btnClass += isActive 
                                                        ? 'bg-blue-600 text-white shadow-[0_5px_15px_rgba(59,130,246,0.4)]' 
                                                        : 'bg-zinc-900 text-gray-500 hover:text-white border border-white/5';

                                                    return (
                                                        <button
                                                            key={cat}
                                                            onClick={() => handleCategoryToggle(cat)}
                                                            className={btnClass}
                                                        >
                                                            {cat}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {loading ? (
                                    <div className="flex justify-center items-center h-64">
                                        <div className="flex flex-col items-center gap-4">
                                            <div className="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                                            <p className="text-blue-500 font-gaming tracking-widest animate-pulse">Загрузка игр...</p>
                                        </div>
                                    </div>
                                ) : error ? (
                                    <div className="col-span-full text-center py-20 text-red-500 flex flex-col items-center bg-red-900/20 rounded-3xl border border-red-500/30 p-8">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mb-4"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                                        <p className="text-xl font-bold mb-2">Упс, что-то пошло не так!</p>
                                        <p className="text-gray-400 max-w-md">{error}</p>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                                        {filteredGames.length > 0 ? (
                                            filteredGames.map(game => (
                                                <GameCard 
                                                    key={game.id} 
                                                    game={game} 
                                                    selectedPlatform={selectedPlatform}
                                                    onAddToCart={addToCart} 
                                                    onOpenModal={setSelectedGame}
                                                    lang={lang}
                                                />
                                            ))
                                        ) : (
                                            <div className="col-span-full text-center py-20 text-gray-500 flex flex-col items-center">
                                                <p className="text-xl">По выбранным фильтрам для {selectedPlatform} пока нет игр</p>
                                                <button onClick={() => setSelectedCategories(['Все'])} className="mt-4 text-blue-500 hover:underline cursor-pointer">
                                                    Сбросить фильтры
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        ) : null}
                    </section>

                    {/* Subscriptions Section */}
                    {selectionStep === 3 && activeView === 'subscriptions' && (
                        <section id="subscriptions" className="py-24 px-6 max-w-7xl mx-auto min-h-screen">
                            <div className="flex flex-col md:flex-row items-end justify-between mb-12 gap-8">
                                <div>
                                    {selectedPlatform && (
                                        <button 
                                            onClick={resetSelection}
                                            className="text-gray-500 hover:text-white mb-4 flex items-center gap-2 text-xs uppercase tracking-widest transition-colors cursor-pointer"
                                        >
                                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                                            Сменить консоль
                                        </button>
                                    )}
                                    <h2 className="text-5xl font-bold font-gaming uppercase tracking-tight mb-4">
                                        Подписки на <span className="text-yellow-500">{selectedPlatform ? selectedPlatform : 'PlayStation'}</span>

                                    <div className="h-1.5 w-24 bg-yellow-500 rounded-full shadow-[0_0_10px_rgba(234,179,8,0.5)]"></div>
                                </div>

                            {!selectedPlatform ? (
                                <div className="flex flex-col items-center justify-center py-20 bg-zinc-900/50 rounded-3xl border border-white/5">
                                    <h3 className="text-2xl font-bold font-gaming uppercase mb-6 text-center">

                                    </h3>
                                    <button onClick={(e) => {
                                        e.preventDefault();
                                        document.getElementById('catalog').scrollIntoView({ behavior: 'smooth' });
                                    }} className="bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-2xl font-bold transition-all cursor-pointer">
                                        Выбрать приставку
                                    </button>
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                                    {subscriptions.map(sub => {
                                        const basePrice = selectedPlatform === 'PlayStation 5' ? sub.pricePS5 : sub.pricePS4;
                                        const discount = selectedPlatform === 'PlayStation 5' ? sub.discountPS5 : sub.discountPS4;
                                        const finalPrice = discount > 0 ? Math.round(basePrice * (1 - discount / 100)) : basePrice;
                                        
                                        const subWithPrice = {
                                            ...sub,
                                            basePrice,
                                            discount,
                                            isSale: discount > 0,
                                            price: finalPrice
                                        };
