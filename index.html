
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Установка цифровых игры на PlayStation</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM (UMD for browser usage without build) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel Standalone (to compile JSX in browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #050505; 
            color: white; 
            scroll-behavior: smooth; 
        }
        .font-gaming { 
            font-family: 'Rajdhani', sans-serif; 
        }
        .ps-blue-glow { 
            box-shadow: 0 0 20px rgba(0, 112, 243, 0.4); 
        }
        .kaspi-red-badge { 
            background: linear-gradient(90deg, #ff0000 0%, #b30000 100%); 
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #050505;
        }
        ::-webkit-scrollbar-thumb {
            background: #27272a;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3b82f6;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <!-- Root Element -->
    <div id="root"></div>

    <!-- Main Application Script -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- CONSTANTS ---
        const WHATSAPP_PHONE = "77066386792"; 
        const INSTAGRAM_LINK = "https://www.instagram.com/dalagame.qz?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==";
        // Ссылка на CSV (Google Таблица должна быть опубликована: Файл -> Поделиться -> Опубликовать в интернете -> CSV)
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQJNJu3ItvN4gbicHMmBPMEuX0iKSoi30tYKpkEMgpFlbwNXEZcgNag9JA_-mreOgiiGh4_h8Bd4QJD/pub?gid=1418400211&single=true&output=csv";
        const DESC_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQJNJu3ItvN4gbicHMmBPMEuX0iKSoi30tYKpkEMgpFlbwNXEZcgNag9JA_-mreOgiiGh4_h8Bd4QJD/pub?gid=1350001392&single=true&output=csv";
        
        // --- COMPONENTS ---

        const Navbar = ({ cartCount, onOpenCart }) => {
            const handleConsultation = () => {
                const message = "Саламатсыз ба! Консультация алғым келеді.";
                const url = "https://api.whatsapp.com/send?phone=" + WHATSAPP_PHONE + "&text=" + encodeURIComponent(message);
                window.open(url, '_blank');
            };

            const scrollToSection = (e, id) => {
                e.preventDefault();
                if (id === 'top') {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }
                const section = document.getElementById(id);
                if (section) {
                    section.scrollIntoView({ behavior: 'smooth' });
                }
            };

            return (
                <nav className="fixed w-full z-50 bg-black/80 backdrop-blur-xl border-b border-white/10 px-6 py-4 flex justify-between items-center">
                    <a href={INSTAGRAM_LINK} target="_blank" className="flex items-center gap-3 group hover:opacity-80 transition-opacity">
                        <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center ps-blue-glow rotate-3 group-hover:rotate-6 transition-transform">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-white"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
                        </div>
                        <span className="text-2xl font-bold tracking-tighter font-gaming group-hover:text-blue-400 transition-colors hidden sm:block">@dalagame.qz</span>
                    </a>
                    <div className="hidden md:flex gap-8 text-xs font-semibold uppercase tracking-widest items-center">
                        <button onClick={(e) => scrollToSection(e, 'top')} className="hover:text-blue-500 transition-colors uppercase bg-transparent border-none cursor-pointer">Главное</button>
                        <button onClick={(e) => scrollToSection(e, 'catalog')} className="hover:text-blue-500 transition-colors uppercase bg-transparent border-none cursor-pointer">Каталог</button>
                        <button onClick={(e) => scrollToSection(e, 'reviews')} className="hover:text-blue-500 transition-colors uppercase bg-transparent border-none cursor-pointer">Отзывы</button>
                        <button onClick={(e) => scrollToSection(e, 'about')} className="hover:text-blue-500 transition-colors uppercase bg-transparent border-none cursor-pointer">О нас</button>
                    </div>
                    <div className="flex items-center gap-4">
                        <button onClick={onOpenCart} className="relative p-2 hover:bg-white/10 rounded-full transition-colors cursor-pointer">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
                            {cartCount > 0 && (
                                <span className="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full">
                                    {cartCount}
                                </span>
                            )}
                        </button>
                        <button 
                            onClick={handleConsultation}
                            className="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-xl text-xs font-bold transition-all hover:scale-105 active:scale-95 hidden sm:block"
                        >
                            КОНСУЛЬТАЦИЯ
                        </button>
                    </div>
                </nav>
            );
        };

        const Hero = ({ descriptions = [] }) => {
            const scrollToCatalog = (e) => {
                e.preventDefault();
                const catalogSection = document.getElementById('catalog');
                if (catalogSection) {
                    catalogSection.scrollIntoView({ behavior: 'smooth' });
                }
            };

            return (
                <section className="relative h-screen flex items-center justify-center overflow-hidden">
                    <div className="absolute inset-0 z-0">
                        <video 
                            autoPlay 
                            loop 
                            muted 
                            playsInline
                            className="w-full h-full object-cover opacity-40 scale-105"
                        >
                            {/* Замените ссылку ниже на ваше видео */}
                            <source src="https://cdn.pixabay.com/video/2020/05/24/40090-424838634_large.mp4" type="video/mp4" />
                        </video>
                        <div className="absolute inset-0 bg-gradient-to-t from-[#050505] via-transparent to-[#050505]"></div>
                    </div>
                    
                    <div className="relative z-10 text-center px-4 max-w-4xl mx-auto">
                        <div className="inline-block kaspi-red-badge px-6 py-1.5 rounded-full text-[10px] font-bold mb-6 uppercase tracking-[0.2em] shadow-lg shadow-red-900/20">
                            Рассрочка Kaspi Red
                        </div>
                        <h1 className="text-5xl md:text-8xl font-bold font-gaming mb-6 leading-[0.9] tracking-tighter">
                            Цифровые игры на<br/>
                            <span className="text-blue-500 drop-shadow-[0_0_15px_rgba(59,130,246,0.5)]">PlayStation 4/5</span>
                        </h1>

                        <p className="text-xl md:text-3xl font-gaming italic text-transparent bg-clip-text bg-gradient-to-r from-blue-200 to-white tracking-widest drop-shadow-sm mb-10">
                            "Не просто магазин игр, а культурный бренд"
                        </p>

                        <div className="flex flex-col gap-3 max-w-xl mx-auto mb-12 text-left md:text-center items-start md:items-center bg-black/40 p-6 rounded-3xl border border-white/5 backdrop-blur-sm">
                            {descriptions.length > 0 ? descriptions.map((desc, i) => (
                                <div key={i} className="flex items-center gap-3 text-gray-200 text-base md:text-lg font-medium">
                                    <span>{desc}</span>
                                </div>
                            )) : (
                                <>
                                    <div className="flex items-center gap-3 text-gray-200 text-base md:text-lg font-medium">
                                        <span className="text-2xl min-w-[30px] text-center">🕹️</span>
                                        <span>Установка цифровых игр для PlayStation™</span>
                                    </div>
                                    <div className="flex items-center gap-3 text-gray-200 text-base md:text-lg font-medium">
                                        <span className="text-2xl min-w-[30px] text-center">🏡</span>
                                        <span>Удаленная установка из дома</span>
                                    </div>
                                    <div className="flex items-center gap-3 text-gray-200 text-base md:text-lg font-medium">
                                        <span className="text-2xl min-w-[30px] text-center">🔴</span>
                                        <span>Оплачивайте через Red/Kredit</span>
                                    </div>
                                    <div className="flex items-center gap-3 text-gray-200 text-base md:text-lg font-medium">
                                        <span className="text-2xl min-w-[30px] text-center">🪁</span>
                                        <span>Новости и развлечения</span>
                                    </div>
                                </>
                            )}
                        </div>

                        <div className="flex flex-col sm:flex-row gap-4 justify-center">
                            <button 
                                onClick={scrollToCatalog}
                                className="bg-blue-600 hover:bg-blue-700 text-white px-12 py-5 rounded-2xl font-bold text-lg transition-all ps-blue-glow hover:scale-105 active:scale-95 text-center cursor-pointer"
                            >
                                ОТКРЫТЬ КАТАЛОГ
                            </button>
                        </div>
                    </div>

                    <div className="absolute bottom-10 left-1/2 -translate-x-1/2 animate-bounce opacity-20">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m7 13 5 5 5-5"/><path d="m7 6 5 5 5-5"/></svg>
                    </div>
                </section>
            );
        };

        const Cart = ({ isOpen, onClose, cart, onRemove, onCheckout }) => {
            if (!isOpen) return null;
            const total = cart.reduce((sum, item) => sum + item.price, 0);

            return (
                <div className="fixed inset-0 z-[100] flex justify-end">
                    <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={onClose}></div>
                    <div className="relative w-full max-w-md bg-[#0a0a0a] h-full border-l border-white/10 p-6 flex flex-col animate-slide-in-right">
                        <div className="flex justify-between items-center mb-8">
                            <h2 className="text-2xl font-bold font-gaming uppercase">Корзина</h2>
                            <button onClick={onClose} className="p-2 hover:bg-white/10 rounded-full cursor-pointer">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                            </button>
                        </div>
                        <div className="flex-1 overflow-y-auto flex flex-col gap-4 pr-2">
                            {cart.length === 0 ? (
                                <div className="text-center mt-20 opacity-50">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round" className="mx-auto mb-4"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
                                    <p className="text-lg">Корзина пуста</p>
                                </div>
                            ) : (
                                cart.map((item, idx) => (
                                    <div key={idx} className="flex gap-4 bg-white/5 p-4 rounded-2xl border border-white/5 relative group">
                                        <img src={item.image} className="w-16 h-16 object-cover rounded-xl" alt={item.name} />
                                        <div className="flex-1">
                                            <h4 className="font-bold text-sm line-clamp-1">{item.name}</h4>
                                            <p className="text-xs text-gray-400 mt-1">{item.platform}</p>
                                            <p className="font-bold text-blue-400 mt-1">{item.price.toLocaleString('ru-RU')} ₸</p>
                                        </div>
                                        <button onClick={() => onRemove(idx)} className="text-gray-500 hover:text-red-500 transition-colors p-2 cursor-pointer">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                                        </button>
                                    </div>
                                ))
                            )}
                        </div>
                        {cart.length > 0 && (
                            <div className="pt-6 border-t border-white/10 mt-6">
                                <div className="flex justify-between items-center mb-6 text-xl font-bold">
                                    <span>Итого:</span>
                                    <span className="text-blue-500">{total.toLocaleString('ru-RU')} ₸</span>
                                </div>
                                <button onClick={onCheckout} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold uppercase tracking-widest transition-all cursor-pointer flex justify-center items-center gap-2">
                                    Оформить заказ
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 2 11 13"/><path d="m22 2-7 20-4-9-9-4Z"/></svg>
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const GameModal = ({ game, selectedPlatform, onClose, onAddToCart }) => {
            const [isAdded, setIsAdded] = useState(false);

            if (!game) return null;
            const monthlyPrice = Math.round(game.price / 12);
            const hasDiscount = game.discount > 0;

            const handleAddToCart = () => {
                onAddToCart(game, selectedPlatform);
                setIsAdded(true);
                setTimeout(() => {
                    setIsAdded(false);
                    onClose();
                }, 1000);
            };

            return (
                <div className="fixed inset-0 z-[110] flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-black/80 backdrop-blur-sm" onClick={onClose}></div>
                    <div className="relative w-full max-w-4xl bg-zinc-900 border border-white/10 rounded-3xl overflow-hidden flex flex-col md:flex-row animate-fade-in shadow-2xl max-h-[90vh]">
                        <button onClick={onClose} className="absolute top-4 right-4 z-10 p-2 bg-black/50 hover:bg-black/80 rounded-full text-white transition-colors cursor-pointer">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                        </button>
                        
                        <div className="w-full md:w-2/5 h-64 md:h-auto relative bg-zinc-800 shrink-0">
                            {game.image ? (
                                <img src={game.image} alt={game.name} className="w-full h-full object-cover" />
                            ) : (
                                <div className="w-full h-full flex items-center justify-center text-white/20 font-bold">NO IMAGE</div>
                            )}
                            {game.isSale && (
                                <div className="absolute top-4 left-4 bg-red-600 text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-widest shadow-lg">
                                    Акция
                                </div>
                            )}
                        </div>
                        
                        <div className="w-full md:w-3/5 p-6 md:p-8 flex flex-col overflow-hidden">
                            <div className="mb-2 text-blue-400 text-xs font-bold uppercase tracking-widest">{game.categoryDisplay}</div>
                            <h2 className="text-3xl font-bold font-gaming uppercase tracking-tight mb-4">{game.name}</h2>
                            
                            <div className="flex-1 overflow-y-auto mb-6 pr-2 custom-scrollbar">
                                {game.description ? (
                                    <div className="text-gray-300 text-sm leading-relaxed whitespace-pre-wrap">
                                        {game.description}
                                    </div>
                                ) : (
                                    <div className="text-gray-500 italic text-sm">Описание отсутствует</div>
                                )}
                            </div>
                            
                            <div className="mt-auto pt-6 border-t border-white/10 shrink-0">
                                <div className="flex items-center justify-between mb-6">
                                    <div className="flex flex-col">
                                        {hasDiscount && (
                                            <div className="flex items-center gap-2">
                                                <span className="text-gray-500 line-through text-sm font-medium">{game.basePrice.toLocaleString()} ₸</span>
                                                <span className="text-red-500 text-xs font-bold bg-red-500/10 px-1.5 py-0.5 rounded">-{game.discount}%</span>
                                            </div>
                                        )}
                                        <span className="text-3xl font-bold text-white">{game.price.toLocaleString()} ₸</span>
                                    </div>
                                    <div className="text-right">
                                        <p className="text-[10px] text-gray-500 uppercase tracking-tighter">В рассрочку</p>
                                        <p className="text-sm font-bold text-red-500">{monthlyPrice.toLocaleString()} ₸ / мес</p>
                                    </div>
                                </div>
                                <button 
                                    onClick={handleAddToCart}
                                    className={`w-full py-4 rounded-xl font-bold uppercase tracking-widest transition-all cursor-pointer flex justify-center items-center gap-2 ${isAdded ? 'bg-green-500 text-white scale-105' : 'bg-blue-600 hover:bg-blue-700 text-white'}`}
                                >
                                    {isAdded ? (
                                        <>
                                            Добавлено
                                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                                        </>
                                    ) : (
                                        <>
                                            В корзину
                                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
                                        </>
                                    )}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const GameCard = ({ game, selectedPlatform, onAddToCart, onOpenModal }) => {
            const [isAdded, setIsAdded] = useState(false);
            const monthlyPrice = Math.round(game.price / 12);
            const hasDiscount = game.discount > 0;

            const handleAddToCart = (e) => {
                e.stopPropagation();
                onAddToCart(game, selectedPlatform);
                setIsAdded(true);
                setTimeout(() => setIsAdded(false), 1500);
            };

            return (
                <div className="group bg-zinc-900/40 border border-white/5 rounded-[2.5rem] overflow-hidden transition-all duration-500 hover:-translate-y-4 hover:border-blue-500/50 hover:shadow-[0_20px_50px_-10px_rgba(59,130,246,0.3)]">
                    <div className="h-80 overflow-hidden relative bg-zinc-800 cursor-pointer" onClick={() => onOpenModal(game)}>
                        {game.image ? (
                            <img 
                                src={game.image} 
                                alt={game.name}
                                className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
                                onError={(e) => {
                                    e.target.onerror = null; 
                                    e.target.style.display = 'none';
                                    e.target.parentElement.classList.add('flex', 'items-center', 'justify-center');
                                    e.target.parentElement.innerHTML = '<span class="text-white/20 font-bold">NO IMAGE</span>';
                                }}
                            />
                        ) : (
                            <div className="w-full h-full flex items-center justify-center text-white/20 font-bold">NO IMAGE</div>
                        )}
                        
                        <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                        
                        {game.isNew && (
                            <div className="absolute top-6 left-6 bg-red-600 text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-widest shadow-lg">
                                Новинка
                            </div>
                        )}
                        
                        {game.isSale && (
                            <div className="absolute top-6 right-6 bg-red-600 text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-widest shadow-lg">
                                Акция
                            </div>
                        )}

                        <div className="absolute bottom-6 left-6 right-6 translate-y-4 opacity-0 group-hover:translate-y-0 group-hover:opacity-100 transition-all duration-300">
                            <span className="text-white/60 text-xs font-gaming uppercase tracking-widest">{game.categoryDisplay}</span>
                        </div>
                    </div>

                    <div className="p-8">
                        <h3 
                            className="text-2xl font-bold mb-4 font-gaming tracking-wide text-white group-hover:text-blue-400 transition-colors line-clamp-2 min-h-[4rem] cursor-pointer"
                            onClick={() => onOpenModal(game)}
                        >
                            {game.name}
                        </h3>
                        
                        <div className="flex items-center justify-between mb-8">
                            <div className="flex flex-col">
                                {hasDiscount && (
                                    <div className="flex items-center gap-2">
                                        <span className="text-gray-500 line-through text-sm font-medium">{game.basePrice.toLocaleString()} ₸</span>
                                        <span className="text-red-500 text-xs font-bold bg-red-500/10 px-1.5 py-0.5 rounded">-{game.discount}%</span>
                                    </div>
                                )}
                                <span className="text-3xl font-bold text-white">{game.price.toLocaleString()} ₸</span>
                            </div>
                            <div className="text-right">
                                <p className="text-[10px] text-gray-500 uppercase tracking-tighter">В рассрочку</p>
                                <p className="text-sm font-bold text-red-500">{monthlyPrice.toLocaleString()} ₸ / мес</p>
                            </div>
                        </div>

                        <button 
                            onClick={handleAddToCart}
                            className={`w-full py-4 rounded-2xl font-bold transition-all flex items-center justify-center gap-2 uppercase tracking-widest text-xs active:scale-95 cursor-pointer ${isAdded ? 'bg-green-500 text-white scale-105' : 'bg-white text-black hover:bg-blue-600 hover:text-white'}`}
                        >
                            {isAdded ? (

                    try {
                        const timestamp = new Date().getTime();

                            fetch(`${SHEET_URL}&_=${timestamp}`),
                            fetch(`${DESC_SHEET_URL}&_=${timestamp}`)
                        ]);
                        
                        const gamesData = await gamesRes.text();
                        const descData = await descRes.text();
                        
                        // Проверка на ошибку (если вернулся HTML вместо CSV)
                        if (gamesData.trim().startsWith('<') || gamesRes.status >= 400) {
                            setError('Ошибка синхронизации: Google Таблица не опубликована или ссылка неверна. Пожалуйста, проверьте настройки доступа таблицы.');
                            setLoading(false);
                            return;
                        }
                        
                        // Парсим CSV описаний
                        const descRows = descData.split('\n').filter(row => row.trim() !== '').slice(1);
                        let fetchedWelcomeMessage = null;
                        const parsedDesc = descRows.map(row => {
                            const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                            if (cols[1] && !fetchedWelcomeMessage) {
                                fetchedWelcomeMessage = cols[1].replace(/^"|"$/g, '').trim();
                            }
                            return cols[0]?.replace(/^"|"$/g, '').trim();
                        }).filter(Boolean);
                        setDescriptions(parsedDesc);
                        if (fetchedWelcomeMessage) {
                            setWelcomeMessage(fetchedWelcomeMessage);
                        }
                        
                        // Парсим CSV игр с учетом переносов строк в кавычках
                        const parseCSV = (text) => {
                            const result = [];
                            let row = [];
                            let col = '';
                            let inQuotes = false;
                            for (let i = 0; i < text.length; i++) {
                                const char = text[i];
                                if (char === '"') {
                                    inQuotes = !inQuotes;
                                } else if (char === ',' && !inQuotes) {
                                    row.push(col.trim());
                                    col = '';
                                } else if (char === '\n' && !inQuotes) {
                                    row.push(col.trim());
                                    if (row.some(c => c !== '')) result.push(row);
                                    row = [];
                                    col = '';
                                } else if (char !== '\r') {
                                    col += char;
                                }
                            }
                            if (col !== '' || row.length > 0) {
                                row.push(col.trim());
                                if (row.some(c => c !== '')) result.push(row);
                            }
                            return result;
                        };

                        const rows = parseCSV(gamesData).slice(1); // Пропускаем заголовок
                        
                        const parsed = rows.filter(cols => cols.length > 1 && cols[0]).map((cols, index) => {
                            const name = cols[0] || 'Без названия';
                            const discountString = cols[1] || '';
                            const pricePS5String = cols[2] || '0';
                            const pricePS4String = cols[3] || '0';
                            const image = cols[4] || '';
                            const description = cols[5] || '';
                            
                            let discount = 0;
                            const discountNum = parseInt(discountString.replace(/\D/g, ''), 10);
                            if (!isNaN(discountNum) && discountNum > 0 && discountNum <= 100) {
                                discount = discountNum;
                            }

                            // Считываем жанры из колонок 7 и далее (индексы 6+)
                            const rawCats = cols.slice(6);
                            const categories = rawCats
                                .filter(c => c && c.toLowerCase() !== 'playstation');

                            // Для отображения на карточке объединяем через разделитель
                            const categoryDisplay = categories.join(' • ');

                            // Чистим цены
                            const pricePS5 = parseInt(pricePS5String.replace(/\D/g, '')) || 0;

                                name,
                                pricePS5,
                                pricePS4,
                                image,
                                categories, // Массив жанров для фильтрации
                                categoryDisplay, // Строка для отображения
                                description, // Описание игры

                                discount, // Сохраняем процент скидки

                        const allCats = parsed.flatMap(g => g.categories);

                        setCategories(['Все', 'Акции', ...uniqueCats]);

            });

            const handleOrderGeneral = () => {
                const message = "Здравствуйте! Хочу узнать насчет рассрочки.";
                const url = "https://api.whatsapp.com/send?phone=" + WHATSAPP_PHONE + "&text=" + encodeURIComponent(message);
                window.open(url, '_blank');
            };

            const addToCart = (game, platform) => {
                setCart([...cart, { ...game, platform }]);
                setIsCartOpen(true);
            };

            const removeFromCart = (index) => {
                setCart(cart.filter((_, i) => i !== index));
            };

            const checkoutCart = () => {
                if (cart.length === 0) return;
                
                let message = `${welcomeMessage}\n\nХочу приобрести следующие игры:\n\n`;
                let total = 0;
                cart.forEach((item, i) => {
                    message += `${i + 1}. ${item.name} (${item.platform}) - ${item.price} ₸\n`;
                    total += item.price;
                });
                message += `\nИтого: ${total} ₸\nМожно ли оплатить через Kaspi Red?`;
                const url = "https://api.whatsapp.com/send?phone=" + WHATSAPP_PHONE + "&text=" + encodeURIComponent(message);
                window.open(url, '_blank');
            };

            return (
                <div className="min-h-screen">
                    <Navbar cartCount={cart.length} onOpenCart={() => setIsCartOpen(true)} />
                    <Cart 
                        isOpen={isCartOpen} 
                        onClose={() => setIsCartOpen(false)} 
                        cart={cart} 
                        onRemove={removeFromCart} 
                        onCheckout={checkoutCart} 
                    />
                    <GameModal 
                        game={selectedGame} 
                        selectedPlatform={selectedPlatform} 
                        onClose={() => setSelectedGame(null)} 
                        onAddToCart={addToCart} 
                    />
                    <Hero descriptions={descriptions} />

                    {/* Catalog Section */}
                    <section id="catalog" className="py-24 px-6 max-w-7xl mx-auto min-h-screen">
                        {!selectedPlatform ? (
                            <div className="flex flex-col items-center justify-center py-20 animate-fade-in">
                                <h2 className="text-4xl md:text-6xl font-bold font-gaming uppercase mb-12 text-center">
                                    Какая у вас <span className="text-blue-500">приставка?</span>
                                </h2>
                                <div className="flex flex-col md:flex-row gap-8 w-full max-w-4xl justify-center">
                                    <button 
                                        onClick={() => setSelectedPlatform('PlayStation 4')}
                                        className="group relative flex-1 bg-zinc-900/50 border border-white/10 rounded-[2.5rem] p-12 hover:bg-blue-600 hover:border-blue-500 transition-all duration-500 hover:scale-105 hover:shadow-[0_0_50px_rgba(37,99,235,0.3)] cursor-pointer"
                                    >
                                        <div className="mb-8 h-24 flex items-center justify-center group-hover:scale-110 transition-transform">
                                            <img 
                                                src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/00/PlayStation_logo.svg/250px-PlayStation_logo.svg.png" 
                                                alt="PS4" 
                                                className="h-full object-contain brightness-0 invert opacity-80 group-hover:opacity-100 transition-opacity" 
                                            />
                                        </div>
                                        <h3 className="text-3xl font-bold font-gaming uppercase tracking-widest text-white">PlayStation 4</h3>
                                        <div className="absolute inset-0 bg-blue-600/10 opacity-0 group-hover:opacity-100 rounded-[2.5rem] transition-opacity"></div>
                                    </button>
                                    <button 
                                        onClick={() => setSelectedPlatform('PlayStation 5')}
                                        className="group relative flex-1 bg-white text-black border border-white/10 rounded-[2.5rem] p-12 hover:bg-gray-100 hover:border-gray-300 transition-all duration-500 hover:scale-105 hover:shadow-[0_0_50px_rgba(255,255,255,0.5)] cursor-pointer"
                                    >
                                        <div className="mb-8 h-24 flex items-center justify-center group-hover:scale-110 transition-transform">
                                            <img 
                                                src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/00/PlayStation_logo.svg/250px-PlayStation_logo.svg.png" 
                                                alt="PS5" 
                                                className="h-full object-contain brightness-0 opacity-80 group-hover:opacity-100 transition-opacity" 
                                            />
                                        </div>
                                        <h3 className="text-3xl font-bold font-gaming uppercase tracking-widest">PlayStation 5</h3>
                                    </button>
                                </div>
                            </div>
                        ) : (
                            <div className="animate-fade-in">
                                <div className="flex flex-col md:flex-row items-end justify-between mb-12 gap-8">
                                    <div>
                                        <button 
                                            onClick={() => setSelectedPlatform(null)}
                                            className="text-gray-500 hover:text-white mb-4 flex items-center gap-2 text-xs uppercase tracking-widest transition-colors cursor-pointer"
                                        >
                                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                                            Сменить консоль
                                        </button>
                                        <h2 className="text-5xl font-bold font-gaming uppercase tracking-tight mb-4">
                                            Игры на <span className="text-blue-500">{selectedPlatform}</span>
                                        </h2>
                                        <div className="h-1.5 w-24 bg-blue-600 rounded-full shadow-[0_0_10px_rgba(59,130,246,0.5)]"></div>
                                    </div>
                                    
                                    <div className="flex flex-col gap-4">
                                        <div className="relative w-full md:w-80">
                                            <input 
                                                type="text" 
                                                placeholder="Поиск игр..." 
                                                value={searchQuery}
                                                onChange={(e) => setSearchQuery(e.target.value)}
                                                className="w-full bg-zinc-900 border border-white/10 rounded-xl py-3 pl-10 pr-4 text-sm text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all"
                                            />
                                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                                        </div>
                                        <div className="flex flex-wrap gap-2">
                                            {categories.map(cat => {
                                                const isSaleCat = cat === 'Акции';
                                                const isActive = selectedCategory === cat;
                                                
                                                let btnClass = 'px-6 py-2 rounded-xl text-xs font-bold transition-all uppercase tracking-widest cursor-pointer ';
                                                
                                                if (isSaleCat) {
                                                    btnClass += isActive 
                                                        ? 'bg-red-600 text-white shadow-[0_5px_15px_rgba(220,38,38,0.4)]' 
                                                        : 'bg-zinc-900 text-red-500 hover:text-red-400 border border-red-500/30 hover:border-red-500/60';
                                                } else {
                                                    btnClass += isActive 
                                                        ? 'bg-blue-600 text-white shadow-[0_5px_15px_rgba(59,130,246,0.4)]' 
                                                        : 'bg-zinc-900 text-gray-500 hover:text-white border border-white/5';
                                                }

                                                return (
                                                    <button
                                                        key={cat}
                                                        onClick={() => setSelectedCategory(cat)}
                                                        className={btnClass}
                                                    >
                                                        {cat}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </div>

                                {loading ? (
                                    <div className="flex justify-center items-center h-64">
                                        <div className="flex flex-col items-center gap-4">
                                            <div className="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                                            <p className="text-blue-500 font-gaming tracking-widest animate-pulse">Загрузка игр...</p>
                                        </div>
                                    </div>
                                ) : error ? (
                                    <div className="col-span-full text-center py-20 text-red-500 flex flex-col items-center bg-red-900/20 rounded-3xl border border-red-500/30 p-8">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mb-4"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                                        <p className="text-xl font-bold mb-2">Упс, что-то пошло не так!</p>
                                        <p className="text-gray-400 max-w-md">{error}</p>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                                        {filteredGames.length > 0 ? (
                                            filteredGames.map(game => (
                                                <GameCard 
                                                    key={game.id} 
                                                    game={game} 
                                                    selectedPlatform={selectedPlatform}
                                                    onAddToCart={addToCart} 
                                                    onOpenModal={setSelectedGame}
                                                />
                                            ))
                                        ) : (
                                            <div className="col-span-full text-center py-20 text-gray-500 flex flex-col items-center">
                                                <p className="text-xl">В категории "{selectedCategory}" для {selectedPlatform} пока нет игр</p>
                                                <button onClick={() => setSelectedCategory('Все')} className="mt-4 text-blue-500 hover:underline cursor-pointer">
                                                    Показать все жанры
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}
                    </section>

                    {/* Kaspi Banner */}
                    <section className="py-12 px-6">
                        <div className="max-w-7xl mx-auto">
                            <div className="bg-zinc-900/50 border border-red-600/30 rounded-[3rem] p-10 flex flex-col lg:flex-row items-center justify-between gap-10 relative overflow-hidden backdrop-blur-md">
                                <div className="absolute top-0 right-0 w-64 h-64 bg-red-600/5 blur-[100px] rounded-full"></div>
                                <div className="flex flex-col md:flex-row items-center gap-10 z-10">
                                    <div className="w-24 h-24 bg-red-600 rounded-3xl flex items-center justify-center text-4xl font-bold font-gaming shadow-[0_10px_40px_rgba(220,38,38,0.4)] rotate-12">Red</div>
                                    <div className="text-center md:text-left">
                                        <h4 className="text-3xl font-bold mb-2 font-gaming italic tracking-wider">KASPI RED & KREDIT</h4>
                                        <p className="text-gray-400 text-lg max-w-md">Начни играть прямо сейчас — плати потом. Рассрочка 0-0-12 без переплат и скрытых комиссий.</p>
                                    </div>
                                </div>
                                <button 
                                    onClick={handleOrderGeneral}
                                    className="bg-red-600 hover:bg-red-700 px-12 py-5 rounded-2xl font-bold transition-all shadow-xl shadow-red-900/20 active:scale-95 z-10 text-white uppercase tracking-widest text-sm"
                                >
                                    Оформить в рассрочку
                                </button>
                            </div>
                        </div>
                    </section>

                    <Reviews />

                    {/* About Us Section */}
                    <section id="about" className="py-24 px-6 max-w-7xl mx-auto border-t border-white/5">
                        <div className="text-center max-w-3xl mx-auto">
                            <h2 className="text-4xl md:text-5xl font-bold font-gaming uppercase mb-8">О <span className="text-blue-500">нас</span></h2>
                            <p className="text-gray-300 text-lg leading-relaxed mb-6">
                                Мы — команда <span className="text-white font-bold">DALA GAME</span>, специализирующаяся на безопасной и быстрой установке цифровых игр для PlayStation 4 и 5. 
                                Наша цель — сделать гейминг доступным для каждого, предлагая лучшие цены, удобную рассрочку Kaspi Red и удаленную установку прямо к вам домой.
                            </p>
                            <p className="text-gray-300 text-lg leading-relaxed">
                                Доверьтесь профессионалам и наслаждайтесь любимыми играми без лишних хлопот!
                            </p>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="py-24 text-center border-t border-white/5">
                        <div className="flex justify-center gap-12 mb-12">
                            <div className="flex flex-col items-center gap-2 group">
                                <div className="w-16 h-16 rounded-2xl bg-zinc-900 flex items-center justify-center group-hover:bg-blue-600/10 transition-colors border border-white/5 group-hover:border-blue-500/50">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="text-blue-500"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                                </div>
                                <span className="text-[10px] font-bold uppercase tracking-widest text-gray-500">Гарантия</span>
                            </div>
                            <div className="flex flex-col items-center gap-2 group">
                                <div className="w-16 h-16 rounded-2xl bg-zinc-900 flex items-center justify-center group-hover:bg-blue-600/10 transition-colors border border-white/5 group-hover:border-blue-500/50">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="text-blue-500"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                                </div>
                                <span className="text-[10px] font-bold uppercase tracking-widest text-gray-500">Скорость</span>
                            </div>
                            <div className="flex flex-col items-center gap-2 group">
                                <div className="w-16 h-16 rounded-2xl bg-zinc-900 flex items-center justify-center group-hover:bg-blue-600/10 transition-colors border border-white/5 group-hover:border-blue-500/50">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="text-blue-500"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
                                </div>
                                <span className="text-[10px] font-bold uppercase tracking-widest text-gray-500">Поддержка</span>
                            </div>
                        </div>
                        <div className="flex flex-col items-center gap-6 max-w-4xl mx-auto px-4">
                            <div className="flex items-center gap-2">
                                <div className="w-6 h-6 bg-blue-600 rounded-md flex items-center justify-center">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3"><rect width="20" height="12" x="2" y="6" rx="2"/><circle cx="12" cy="12" r="2"/></svg>
                                </div>
                                <span className="font-gaming text-xl font-bold tracking-widest">dalagame.qz</span>
                            </div>
                            <div className="text-gray-500 text-sm md:text-base leading-relaxed space-y-2 opacity-80 max-w-3xl mx-auto">
                                <p>
                                    Устанавливаем цифровые игры на PlayStation с удалённой установкой — прямо из дома.
                                    Работаем с 2022 года. Тысячи довольных клиентов и сотни реальных отзывов.
                                </p>
                                <p className="text-gray-600">
                                    PlayStation үшін цифрлық ойындарды қашықтан орнатамыз — үйден шықпай-ақ.
                                    2022 жылдан бері жұмыс істейміз. Мыңдаған қанағаттанған клиент және жүздеген шынайы пікір.
                                </p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        // --- RENDER ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
